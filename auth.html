<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 / 注册 - AJOU</title>
    <script src="assets/js/vendor/tailwindcss-cdn.js?v=20260428-1"></script>
    <script src="assets/js/tailwind-config.js?v=20260428-3"></script>
    <script src="assets/js/vendor/jquery-3.7.1.min.js?v=20260428-1"></script>
    <script src="assets/js/layout.js?v=20260504-2"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css?v=20260428-5" />
  </head>
  <body
    class="bg-bg-gray text-gray-800 font-sans antialiased min-h-screen flex flex-col"
  >
    <div id="site-header"></div>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
      <section
        class="w-full max-w-md bg-white border border-gray-200 rounded-xl shadow-sm p-6"
      >
        <div class="mb-6">
          <h1 id="auth-title" class="text-2xl font-bold text-gray-900">
            登录账号
          </h1>
          <p id="auth-subtitle" class="text-sm text-gray-500 mt-2">
            进入控制台管理你的云服务。
          </p>
        </div>

        <div class="grid grid-cols-2 gap-2 bg-gray-100 rounded p-1 mb-5">
          <button
            type="button"
            data-auth-tab="login"
            class="auth-tab bg-white text-primary shadow-sm rounded py-2 text-sm font-medium transition"
          >
            登录
          </button>
          <button
            type="button"
            data-auth-tab="register"
            class="auth-tab text-gray-600 rounded py-2 text-sm font-medium transition"
          >
            注册
          </button>
        </div>

        <div
          id="auth-message"
          class="hidden mb-4 rounded border px-3 py-2 text-sm"
        ></div>

        <form id="login-form" data-auth-panel="login" class="space-y-4">
          <div>
            <label
              for="login-email"
              class="block text-sm font-medium text-gray-700 mb-2"
              >邮箱</label
            >
            <input
              id="login-email"
              name="email"
              type="email"
              autocomplete="email"
              required
              class="w-full border border-gray-300 rounded px-3 py-2.5 text-sm focus:outline-none focus:border-primary"
              placeholder="name@example.com"
            />
          </div>

          <div>
            <label
              for="login-password"
              class="block text-sm font-medium text-gray-700 mb-2"
              >密码</label
            >
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="w-full border border-gray-300 rounded px-3 py-2.5 text-sm focus:outline-none focus:border-primary"
              placeholder="请输入密码"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-primary hover:bg-primary-hover text-white rounded py-2.5 text-sm font-medium transition"
          >
            登录
          </button>
<div
            id="google-login-button"
            class="w-full min-h-[44px] flex justify-center"
          ></div>
        </form>

        <form
          id="register-form"
          data-auth-panel="register"
          class="hidden space-y-4"
        >
          <div>
            <label
              for="register-email"
              class="block text-sm font-medium text-gray-700 mb-2"
              >邮箱</label
            >
            <input
              id="register-email"
              name="email"
              type="email"
              autocomplete="email"
              required
              class="w-full border border-gray-300 rounded px-3 py-2.5 text-sm focus:outline-none focus:border-primary"
              placeholder="name@example.com"
            />
          </div>

          <div>
            <label
              for="register-password"
              class="block text-sm font-medium text-gray-700 mb-2"
              >密码</label
            >
            <input
              id="register-password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="6"
              class="w-full border border-gray-300 rounded px-3 py-2.5 text-sm focus:outline-none focus:border-primary"
              placeholder="至少 6 位密码"
            />
          </div>

          <div>
            <label
              for="register-code"
              class="block text-sm font-medium text-gray-700 mb-2"
              >验证码</label
            >
            <div class="flex gap-2">
              <input
                id="register-code"
                name="code"
                type="text"
                inputmode="numeric"
                required
                class="flex-1 min-w-0 border border-gray-300 rounded px-3 py-2.5 text-sm focus:outline-none focus:border-primary"
                placeholder="请输入验证码"
              />
              <button
                id="send-code-button"
                type="button"
                class="w-28 border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 rounded px-3 py-2.5 text-sm font-medium transition"
              >
                获取验证码
              </button>
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-primary hover:bg-primary-hover text-white rounded py-2.5 text-sm font-medium transition"
          >
            注册
          </button>
        </form>

        <div class="mt-5 text-center text-sm text-gray-500">
          <span id="auth-switch-text">还没有账号？</span>
          <button
            type="button"
            id="auth-switch-button"
            class="text-primary hover:text-primary-hover font-medium"
          >
            立即注册
          </button>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const tabs = document.querySelectorAll("[data-auth-tab]");
        const panels = document.querySelectorAll("[data-auth-panel]");
        const title = document.getElementById("auth-title");
        const subtitle = document.getElementById("auth-subtitle");
        const message = document.getElementById("auth-message");
        const switchText = document.getElementById("auth-switch-text");
        const switchButton = document.getElementById("auth-switch-button");
        let currentMode = "login";

        function setMode(mode) {
          currentMode = mode === "register" ? "register" : "login";
          window.location.hash = currentMode;
          message.classList.add("hidden");

          tabs.forEach(function (tab) {
            const isActive = tab.dataset.authTab === currentMode;
            tab.classList.toggle("bg-white", isActive);
            tab.classList.toggle("text-primary", isActive);
            tab.classList.toggle("shadow-sm", isActive);
            tab.classList.toggle("text-gray-600", !isActive);
          });

          panels.forEach(function (panel) {
            panel.classList.toggle(
              "hidden",
              panel.dataset.authPanel !== currentMode,
            );
          });

          if (currentMode === "register") {
            title.textContent = "注册账号";
            subtitle.textContent = "创建账号后即可购买和管理云服务。";
            switchText.textContent = "已有账号？";
            switchButton.textContent = "立即登录";
          } else {
            title.textContent = "登录账号";
            subtitle.textContent = "进入控制台管理你的云服务。";
            switchText.textContent = "还没有账号？";
            switchButton.textContent = "立即注册";
          }
        }

        tabs.forEach(function (tab) {
          tab.addEventListener("click", function () {
            setMode(tab.dataset.authTab);
          });
        });

        switchButton.addEventListener("click", function () {
          setMode(currentMode === "login" ? "register" : "login");
        });

        setMode(
          window.location.hash.replace("#", "") === "register"
            ? "register"
            : "login",
        );
        window.addEventListener("hashchange", function () {
          setMode(
            window.location.hash.replace("#", "") === "register"
              ? "register"
              : "login",
          );
        });
      })();
    </script>
<script src="assets/js/config/auth.config.js?v=20260428-3"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="assets/js/auth.js?v=20260428-3"></script>
<script src="assets/js/nav-auth.js?v=20260428-3"></script>
  </body>
</html>
